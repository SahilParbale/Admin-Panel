<div class="modal-overlay" *ngIf="isOpen" (click)="onBackdropClick($event)">
    <div class="modal-content glass-effect">
        <div class="modal-header">
            <div class="header-main">
                <div class="method-badge" [style.background-color]="elasticityColor + '20'"
                    [style.color]="elasticityColor">
                    <i class='bx bx-scatter-chart'></i>
                    <span>Elasticity Detail</span>
                </div>
                <h2>Price vs Demand Point</h2>
            </div>
            <button class="close-btn" (click)="closeModal()">
                <i class='bx bx-x'></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="stats-row">
                <div class="stat-main" style="border-left-color: #ef4444;">
                    <span class="label">Price Change</span>
                    <h3 class="value" style="color: #ef4444;">{{ priceSign }}{{ priceChange }}%</h3>
                </div>
                <div class="stat-main" style="border-left-color: #3b82f6;">
                    <span class="label">Demand Change</span>
                    <h3 class="value" style="color: #3b82f6;">{{ demandSign }}{{ demandChange }}%</h3>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-card">
                    <div class="card-icon" style="color: #8b5cf6; background: rgba(139, 92, 246, 0.1);">
                        <i class='bx bx-line-chart'></i>
                    </div>
                    <div class="card-info">
                        <span class="label">Elasticity Ratio</span>
                        <span class="value">{{ elasticityRatio }}</span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="card-icon" [style.color]="elasticityColor" [style.background]="elasticityColor + '1a'">
                        <i class='bx bx-analyse'></i>
                    </div>
                    <div class="card-info">
                        <span class="label">Demand Type</span>
                        <span class="value" [style.color]="elasticityColor">{{ elasticityType }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-primary" [style.background-color]="elasticityColor" (click)="closeModal()">
                Dismiss Report
            </button>
        </div>
    </div>
</div>
