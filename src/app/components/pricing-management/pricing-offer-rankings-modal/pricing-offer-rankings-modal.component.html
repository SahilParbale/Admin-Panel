<div class="modal-overlay" *ngIf="isOpen" (click)="onBackdropClick($event)">
    <div class="modal-content glass-effect">
        <div class="modal-header">
            <div class="header-main">
                <div class="method-badge" style="background-color: rgba(139, 92, 246, 0.15); color: #8b5cf6;">
                    <i class='bx bx-award'></i>
                    <span>Offer Ranking Detail</span>
                </div>
                <h2>{{ offerName }}</h2>
            </div>
            <button class="close-btn" (click)="closeModal()">
                <i class='bx bx-x'></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="payment-stats">
                <div class="stat-main" style="border-left-color: #8b5cf6;">
                    <span class="label">Total Redemptions</span>
                    <h3 class="value" style="color: #8b5cf6;">{{ formatNumber(redemptions) }}</h3>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-card">
                    <div class="card-icon fee" style="color: #06b6d4; background: rgba(6, 182, 212, 0.1);">
                        <i class='bx bx-time-five'></i>
                    </div>
                    <div class="card-info">
                        <span class="label">Peak Redemption Time</span>
                        <span class="value">Evening (6PM - 9PM)</span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="card-icon time" style="color: #10b981; background: rgba(16, 185, 129, 0.1);">
                        <i class='bx bx-user-check'></i>
                    </div>
                    <div class="card-info">
                        <span class="label">New Customer Acq.</span>
                        <span class="value">~35%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-primary" style="background-color: #8b5cf6;" (click)="closeModal()">
                Dismiss Report
            </button>
        </div>
    </div>
</div>
