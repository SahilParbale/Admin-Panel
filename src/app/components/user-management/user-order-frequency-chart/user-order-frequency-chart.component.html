<div class="chart-card">
    <div class="chart-header">
        <h3>User Order Frequency</h3>
        <div class="header-actions">
            <button class="icon-btn" title="Print"><i class='bx bx-printer'></i></button>
            <button class="icon-btn" title="Download"><i class='bx bx-download'></i></button>
            <button class="icon-btn" title="Export"><i class='bx bx-export'></i></button>
        </div>
    </div>
    <div class="chart-body">
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="'bar'">
        </canvas>
    </div>
</div>
