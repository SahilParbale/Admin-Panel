<div class="sales-analytics-container">

    <div class="header-controls">
        <h2>{{ activeTab === 'sales' ? 'Sales Overview' : 'Analytics Dashboard' }}</h2>
        <div class="management-tabs">
            <button [class.active]="activeTab === 'sales'" (click)="setActiveTab('sales')">Sales</button>
            <button [class.active]="activeTab === 'analytics'" (click)="setActiveTab('analytics')">Analytics</button>
        </div>
    </div>

    <ng-container *ngIf="activeTab === 'sales'">
        <app-sales-performance-master-table></app-sales-performance-master-table>
        <app-sales-financial-summary-table></app-sales-financial-summary-table>
    </ng-container>

    <ng-container *ngIf="activeTab === 'analytics'">
        <div class="empty-state">
            <i class='bx bx-pie-chart-alt-2'></i>
            <p>Analytics content coming soon...</p>
        </div>
    </ng-container>
</div>
