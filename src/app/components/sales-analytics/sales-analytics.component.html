<div class="sales-analytics-container">

    <div class="header-controls">
        <h2>Sales & Analytics</h2>
        <div class="management-tabs">
            <button [class.active]="activeTab === 'sales'" (click)="setActiveTab('sales')">Sales Performance</button>
            <button [class.active]="activeTab === 'analytics'" (click)="setActiveTab('analytics')">Financial
                Analytics</button>
        </div>
    </div>

    <ng-container *ngIf="activeTab === 'sales'">
        <app-sales-performance-master-table></app-sales-performance-master-table>
        <app-sales-financial-summary-table></app-sales-financial-summary-table>
    </ng-container>

    <ng-container *ngIf="activeTab === 'analytics'">
        <app-financial-performance-analytics-table></app-financial-performance-analytics-table>
    </ng-container>

</div>
