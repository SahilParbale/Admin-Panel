<div class="card-panel mt-24">
    <div class="panel-header">
        <div class="title-group">
            <h3>Sales Revenue vs Order Trends</h3>
            <span class="subtitle">Monthly correlation between gross revenue and total volume</span>
        </div>
        <div class="actions">
            <div class="filter-group">
                <div class="dropdown-container">
                    <span class="btn-monthly" (click)="toggleDropdown('period')">
                        {{ getLabel(selectedPeriod, periodOptions) }} <i class='bx bx-chevron-down'></i>
                    </span>
                    <div class="dropdown-menu" *ngIf="showPeriodDropdown">
                        <ul>
                            <li *ngFor="let opt of periodOptions" (click)="setFilter('period', opt.value)" [class.active]="opt.value === selectedPeriod">
                                {{ opt.label }}
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="icon-actions">
                <i class='bx bx-printer' title="Print Chart"></i>
                <i class='bx bx-trending-up' title="View Trends"></i>
                <i class='bx bx-export' title="Export PNG"></i>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas baseChart [data]="chartData" [options]="chartOptions" [type]="'bar'">
        </canvas>
    </div>
</div>
