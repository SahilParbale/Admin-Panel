<div class="dashboard-container">
    <!-- Top Stats Row -->
    <div class="stats-row">
        <app-stat-card title="Total Restaurant" value="10,000" trend="up" trendValue="+17%"
            trendLabel="/Month"></app-stat-card>
        <app-stat-card title="Total Revenue" value="$87,363" trend="up" trendValue="+11%"
            trendLabel="/Month"></app-stat-card>
        <app-stat-card title="New Customers" value="120" trend="down" trendValue="-15%"
            trendLabel="/Month"></app-stat-card>
    </div>

    <div class="main-grid">
        <div class="left-column">
            <div class="card-panel">
                <div class="panel-header">
                    <div class="title-group">
                        <h3>Order Analytics</h3>
                        <span class="subtitle">Excellent job on your order 👏</span>
                    </div>
                    <div class="actions">
                        <span class="filter">Vendor: All Vendor <i class='bx bx-chevron-down'></i></span>
                        <span class="filter">Status: Completed <i class='bx bx-chevron-down'></i></span>
                        <span class="btn-monthly">Monthly <i class='bx bx-chevron-down'></i></span>
                    </div>
                </div>
                <app-analytics-chart></app-analytics-chart>
            </div>

            <div class="card-panel">
                <div class="panel-header">
                    <div class="title-group">
                        <h3>Order Activities</h3>
                        <span class="subtitle">Keep track of recent order activities</span>
                    </div>
                    <div class="actions">
                        <span class="filter">Status: Delivered <i class='bx bx-chevron-down'></i></span>
                        <span class="filter">Days: Today <i class='bx bx-chevron-down'></i></span>
                        <div class="icon-actions">
                            <i class='bx bx-printer'></i>
                            <i class='bx bx-export'></i>
                            <i class='bx bx-download'></i>
                        </div>
                    </div>
                </div>
                <app-orders-table></app-orders-table>
            </div>
        </div>

        <div class="right-column">
            <div class="card-panel">
                <div class="panel-header">
                    <div class="title-group">
                        <h3>Oder Performance <span class="light">vs last month</span></h3>
                    </div>
                    <div class="actions">
                        <span class="btn-monthly">Month <i class='bx bx-chevron-down'></i></span>
                    </div>
                </div>
                <app-performance-chart></app-performance-chart>
            </div>

            <div class="card-panel">
                <div class="panel-header">
                    <div class="title-group">
                        <h3>Revenue Profile</h3>
                        <div class="revenue-amount">$25,843.45 <span class="badge">+11%</span> <span
                                class="light">/Month</span></div>
                        <span class="subtitle">Your performance is excellent 👏</span>
                    </div>
                    <div class="actions">
                        <span class="btn-monthly">Monthly <i class='bx bx-chevron-down'></i></span>
                    </div>
                </div>
                <app-revenue-chart></app-revenue-chart>
            </div>
        </div>
    </div>
</div>
